name: "Check Unused Translation Keys"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-unused-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Check for unused translation keys
        run: |
          echo "Scanning for unused translation keys..."
          node scripts/validate-translations.js find-unused
