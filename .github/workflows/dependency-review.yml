name: 'Dependency Review'

on:
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: 'Dependency Review'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          # Fail the action if vulnerabilities are found
          fail-on-severity: moderate
          # Comment on the PR with the results
          comment-summary-in-pr: always
          # Deny licenses that are not compatible with Jellyfin
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
          # Allow the CI-only TruffleHog GitHub Action despite its AGPL license classification.
          allow-dependencies-licenses: pkg:githubactions/trufflesecurity/trufflehog
