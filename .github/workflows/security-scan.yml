name: Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Run every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Scan for secrets accidentally committed
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # Scan .NET dependencies for known vulnerabilities
  dotnet-security:
    name: .NET Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: List vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable-packages.txt

      - name: Check for vulnerabilities
        run: |
          if grep -q "has the following vulnerable packages" vulnerable-packages.txt; then
            echo "::error::Vulnerable packages found!"
            cat vulnerable-packages.txt
            exit 1
          else
            echo "No vulnerable packages found."
          fi

  # JavaScript/TypeScript security audit
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check-package
        run: |
          if [ -f "package.json" ]; then
            echo "has-package=true" >> $GITHUB_OUTPUT
          else
            echo "has-package=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check-package.outputs.has-package == 'true'
        run: npm ci || npm install

      - name: Run npm audit
        if: steps.check-package.outputs.has-package == 'true'
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # SARIF upload for GitHub Security tab
  upload-sarif:
    name: Upload SARIF Results
    runs-on: ubuntu-latest
    needs: [secret-scan, dotnet-security]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "All security scans completed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
